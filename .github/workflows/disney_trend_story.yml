name: Disney Trend Story

on:
  schedule:
    # 毎日 22:15 UTC = 翌日 07:15 JST
    # disney_trend.yml (22:00 UTC) の直後に走らせ、
    # 同じ日の収集データ (reports/disney_trend_{date}.json) を再利用する
    - cron: '15 22 * * *'

  workflow_dispatch:
    inputs:
      reuse:
        description: '今日の trend JSON を再利用する (false にすると再収集)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'ドライラン (画像のみ生成、投稿しない)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  TZ: Asia/Tokyo

jobs:
  trend-story:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null 2>&1
          fc-cache -f

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trend story post
        env:
          INSTAGRAM_API_MODE: ${{ secrets.INSTAGRAM_API_MODE }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          REUSE="${{ github.event.inputs.reuse }}"
          REUSE="${REUSE:-true}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          DRY_RUN="${DRY_RUN:-false}"

          ARGS=""
          if [ "$REUSE" = "true" ]; then
            ARGS="$ARGS --reuse"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          else
            ARGS="$ARGS --post"
          fi

          echo "Running: python daily_trend_story_post.py $ARGS"
          python daily_trend_story_post.py $ARGS

      - name: Upload story image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: disney-trend-story-${{ github.run_id }}
          path: reports/disney_trend_story_*.png
          retention-days: 30
