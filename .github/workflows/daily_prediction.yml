name: Daily TDR Wait Time Prediction

on:
  schedule:
    # 毎日 11:00 UTC = 日本時間 20:00 JST に実行（翌日の予測を投稿）
    - cron: '0 11 * * *'

  workflow_dispatch:
    inputs:
      date:
        description: '予測日 (YYYY-MM-DD形式、空欄は明日)'
        required: false
        default: ''

env:
  TZ: Asia/Tokyo

jobs:
  predict-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null 2>&1
          fc-cache -f

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction and post to X
        env:
          X_POST_MODE: direct
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then
            DATE_ARG=$(date -d "+1 day" +%Y-%m-%d)
          fi
          echo "Prediction date: $DATE_ARG"
          python daily_x_post.py --post --date "$DATE_ARG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: predictions-${{ github.run_id }}
          path: predictions_x/
          retention-days: 7
