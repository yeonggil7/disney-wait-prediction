name: Afternoon Entry Guide Post

on:
  schedule:
    # 14:00 JST = 05:00 UTC → 15時入園者向け
    - cron: '0 5 * * *'
    # 16:00 JST = 07:00 UTC → 17時入園者向け
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      entry:
        description: '入園時刻 (15 or 17)'
        required: true
        default: '15'
      date:
        description: '対象日 (空欄=今日)'
        required: false
        default: ''

env:
  TZ: Asia/Tokyo

jobs:
  afternoon-entry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine entry hour
        id: params
        run: |
          ENTRY="${{ github.event.inputs.entry }}"
          if [ -z "$ENTRY" ]; then
            HOUR=$(date +%H)
            if [ "$HOUR" -lt 15 ]; then
              ENTRY=15
            else
              ENTRY=17
            fi
          fi
          echo "entry=$ENTRY" >> $GITHUB_OUTPUT

          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then
            DATE_ARG=$(date +%Y-%m-%d)
          fi
          echo "date=$DATE_ARG" >> $GITHUB_OUTPUT

      - name: Post afternoon entry guide
        env:
          X_POST_MODE: direct
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO }}
        run: |
          echo "Entry: ${{ steps.params.outputs.entry }}時, Date: ${{ steps.params.outputs.date }}"
          python afternoon_entry_post.py \
            --post \
            --entry ${{ steps.params.outputs.entry }} \
            --date ${{ steps.params.outputs.date }}
