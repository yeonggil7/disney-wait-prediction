name: Weekly Thread Post

on:
  schedule:
    # 毎週日曜 06:00 UTC = 日本時間 15:00 JST（週末午後にスレッド投稿）
    - cron: '0 6 * * 0'
    # 毎週水曜 00:00 UTC = 日本時間 09:00 JST（平日朝にスレッド投稿）
    - cron: '0 0 * * 3'

  workflow_dispatch:
    inputs:
      thread:
        description: 'スレッド名（空欄=自動選択）'
        required: false
        default: ''

env:
  TZ: Asia/Tokyo

jobs:
  thread-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post thread
        env:
          X_POST_MODE: direct
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          THREAD_ARG="${{ github.event.inputs.thread }}"
          if [ -n "$THREAD_ARG" ]; then
            python thread_x_post.py --post --thread "$THREAD_ARG"
          else
            python thread_x_post.py --post
          fi
